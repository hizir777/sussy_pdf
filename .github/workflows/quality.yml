name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Set up Python
      uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pylint
    
    - name: Format check with ruff
      run: ruff check src/ tests/ --select=E,W,F
    
    - name: Type check with mypy (optional)
      run: mypy src/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Import sort check
      run: ruff check src/ tests/ --select=I
    
    - name: Docstring coverage
      run: |
        python -m pip install interrogate
        interrogate -vv src/ || true

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
    
    - name: Set up Python
      uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
      with:
        python-version: '3.10'
    
    - name: Check documentation
      run: |
        if [ -f "README.md" ]; then
          echo "✅ README.md exists"
        else
          echo "❌ README.md missing"
          exit 1
        fi
        
        if [ -f "CONTRIBUTING.md" ]; then
          echo "✅ CONTRIBUTING.md exists"
        else
          echo "❌ CONTRIBUTING.md missing"
          exit 1
        fi
        
        if [ -f "SECURITY.md" ]; then
          echo "✅ SECURITY.md exists"
        else
          echo "❌ SECURITY.md missing"
          exit 1
        fi

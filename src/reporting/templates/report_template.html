<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sussy PDF - Analiz Raporu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --neon-green: #00e676;
            --neon-red: #ff1744;
            --neon-orange: #ff9100;
            --neon-yellow: #ffc400;
            --border: rgba(255,255,255,0.06);
            --risk-color: #808080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.3rem; margin-bottom: 1rem; color: var(--accent-blue); }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        .header {
            background: linear-gradient(135deg, #1e2440 0%, #0f1629 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .header .subtitle { color: var(--text-secondary); font-size: 0.9rem; }

        .risk-gauge {
            text-align: center;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        .risk-score {
            font-size: 4rem;
            font-weight: 700;
            color: var(--risk-color);
            text-shadow: 0 0 30px var(--risk-color);
        }
        .risk-label {
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .card.full { grid-column: 1 / -1; }

        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 0.6rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }

        .tag-critical { color: var(--neon-red); }
        .tag-high { color: var(--neon-orange); }
        .tag-medium { color: var(--neon-yellow); }
        .tag-low { color: var(--neon-green); }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-critical { background: rgba(255,23,68,0.13); color: var(--neon-red); border: 1px solid rgba(255,23,68,0.25); }
        .badge-high { background: rgba(255,145,0,0.13); color: var(--neon-orange); border: 1px solid rgba(255,145,0,0.25); }
        .badge-medium { background: rgba(255,196,0,0.13); color: var(--neon-yellow); border: 1px solid rgba(255,196,0,0.25); }
        .badge-low { background: rgba(0,230,118,0.13); color: var(--neon-green); border: 1px solid rgba(0,230,118,0.25); }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--risk-color);
            transition: width 0.5s ease;
        }

        .recommendation {
            background: #1e293b;
            border-left: 3px solid var(--accent-blue);
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0 8px 8px 0;
        }

        .mitre-tag {
            display: inline-block;
            background: rgba(139,92,246,0.13);
            color: var(--accent-purple);
            border: 1px solid rgba(139,92,246,0.25);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            margin: 0.3rem;
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .card.full { grid-column: 1; }
            body { padding: 1rem; }
            .risk-score { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sussy PDF - Analiz Raporu</h1>
            <p class="subtitle" id="report-timestamp">Rapor Tarihi</p>
        </div>

        <div class="risk-gauge">
            <div class="risk-score" id="risk-score-value">0</div>
            <div class="risk-label">/ 100 Risk Skoru</div>
            <p style="margin-top:1rem; font-size:1.1rem;" id="verdict-text"></p>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Dosya Bilgileri</h2>
                <table>
                    <tr><th>Alan</th><th>Deger</th></tr>
                    <tbody id="file-info-table"></tbody>
                </table>
            </div>

            <div class="card">
                <h2>Skor Dagilimi</h2>
                <div id="score-breakdown"></div>
            </div>

            <div class="card full">
                <h2>Tehdit Etiketleri</h2>
                <div id="tags-section"></div>
            </div>

            <div class="card">
                <h2>MITRE ATT&amp;CK</h2>
                <div id="mitre-section"></div>
            </div>

            <div class="card">
                <h2>Oneriler</h2>
                <div id="recommendations-section"></div>
            </div>
        </div>

        <footer>
            <p>Sussy PDF Analyzer v1.0.0</p>
        </footer>
    </div>

    <script>
        // Report data is injected by Python's report_builder.py
        // via string replacement of the REPORT_DATA placeholder
        var REPORT_DATA = "__REPORT_DATA__";

        function init() {
            if (REPORT_DATA === "__REPORT_DATA__") return;

            var data;
            try {
                data = JSON.parse(REPORT_DATA);
            } catch (e) {
                return;
            }

            // Set risk color CSS variable
            if (data.risk_color) {
                document.documentElement.style.setProperty("--risk-color", data.risk_color);
            }

            // Timestamp
            var tsEl = document.getElementById("report-timestamp");
            if (tsEl && data.timestamp) tsEl.textContent = "Olusturulma: " + data.timestamp;

            // Risk score
            var scoreEl = document.getElementById("risk-score-value");
            if (scoreEl) scoreEl.textContent = data.risk_score || "0";

            // Verdict
            var verdictEl = document.getElementById("verdict-text");
            if (verdictEl) verdictEl.textContent = data.verdict || "";

            // File info
            var fileTable = document.getElementById("file-info-table");
            if (fileTable && data.file_info) {
                var rows = [
                    ["Dosya Adi", data.file_info.name],
                    ["Boyut", data.file_info.size],
                    ["PDF Versiyon", data.file_info.version],
                    ["MD5", data.file_info.md5],
                    ["SHA1", data.file_info.sha1],
                    ["SHA256", data.file_info.sha256]
                ];
                var html = "";
                for (var i = 0; i < rows.length; i++) {
                    var cls = (i >= 3) ? ' class="mono" style="font-size:0.7rem;"' : "";
                    html += "<tr><td>" + rows[i][0] + "</td><td" + cls + ">" + (rows[i][1] || "N/A") + "</td></tr>";
                }
                fileTable.innerHTML = html;
            }

            // Score breakdown
            var breakdownEl = document.getElementById("score-breakdown");
            if (breakdownEl && data.breakdown) {
                var bhtml = "";
                for (var j = 0; j < data.breakdown.length; j++) {
                    var b = data.breakdown[j];
                    var pct = Math.round((b.points / b.max_points) * 100);
                    bhtml += '<div style="margin-bottom:1rem;">';
                    bhtml += '<div style="display:flex;justify-content:space-between;">';
                    bhtml += "<span>" + b.category + "</span>";
                    bhtml += '<span class="mono">' + b.points + "/" + b.max_points + "</span>";
                    bhtml += "</div>";
                    bhtml += '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;"></div></div>';
                    bhtml += '<small style="color:var(--text-secondary);">' + b.details + "</small>";
                    bhtml += "</div>";
                }
                breakdownEl.innerHTML = bhtml;
            }

            // Tags
            var tagsEl = document.getElementById("tags-section");
            if (tagsEl && data.tag_matches) {
                if (data.tag_matches.length === 0) {
                    tagsEl.innerHTML = '<p style="color:var(--neon-green);">Supheli etiket bulunamadi.</p>';
                } else {
                    var thtml = "<table><tr><th>Etiket</th><th>Seviye</th><th>Sayi</th><th>Aciklama</th></tr>";
                    for (var k = 0; k < data.tag_matches.length; k++) {
                        var tag = data.tag_matches[k];
                        thtml += "<tr>";
                        thtml += '<td class="mono tag-' + tag.level + '">' + tag.tag + "</td>";
                        thtml += '<td><span class="badge badge-' + tag.level + '">' + tag.level.toUpperCase() + "</span></td>";
                        thtml += "<td>" + tag.count + "</td>";
                        thtml += "<td>" + tag.description + "</td>";
                        thtml += "</tr>";
                    }
                    thtml += "</table>";
                    tagsEl.innerHTML = thtml;
                }
            }

            // MITRE
            var mitreEl = document.getElementById("mitre-section");
            if (mitreEl && data.mitre_mappings) {
                if (data.mitre_mappings.length === 0) {
                    mitreEl.innerHTML = '<p style="color:var(--text-secondary);">Eslesme yok.</p>';
                } else {
                    var mhtml = "";
                    for (var n = 0; n < data.mitre_mappings.length; n++) {
                        var mi = data.mitre_mappings[n];
                        mhtml += '<div class="mitre-tag">' + mi.id + " - " + mi.name + "</div>";
                    }
                    mitreEl.innerHTML = mhtml;
                }
            }

            // Recommendations
            var recEl = document.getElementById("recommendations-section");
            if (recEl && data.recommendations) {
                var rhtml = "";
                for (var p = 0; p < data.recommendations.length; p++) {
                    rhtml += '<div class="recommendation">' + data.recommendations[p] + "</div>";
                }
                recEl.innerHTML = rhtml;
            }
        }

        init();
    </script>
</body>
</html>
